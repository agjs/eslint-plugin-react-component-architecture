name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@b4ffde65f69735febad8c6182f91ea7f1d183b7b

      - uses: pnpm/action-setup@fe02b3b
        with:
          version: 10.33.0

      - uses: actions/setup-node@1a4442caab129478691015c6976ebb13592f26cc
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
